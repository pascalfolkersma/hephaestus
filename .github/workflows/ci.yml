name: CI

# Continuous cross-platform test gate. Runs the build + full test suite on both
# Linux (matches the publish runner) and Windows (matches the primary dev env) so
# platform-divergent failures are caught on every push/PR — not for the first time
# at release on a tag (which is how the M15.6 cross-platform debt surfaced).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
